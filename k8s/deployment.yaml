apiVersion: apps/v1
kind: Deployment
metadata:
  name: musicarr
  namespace: musicarr
  labels:
    app.kubernetes.io/name: musicarr
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: musicarr
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: musicarr
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: musicarr
          image: musicarr:latest
          ports:
            - containerPort: 5000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: musicarr-config
            - secretRef:
                name: musicarr-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            failureThreshold: 30
            periodSeconds: 10
