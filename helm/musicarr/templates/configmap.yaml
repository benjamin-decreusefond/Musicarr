apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "musicarr.fullname" . }}-config
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.config.aspnetcoreEnvironment }}
  ASPNETCORE_URLS: "http://+:{{ .Values.service.targetPort }}"
  Jellyfin__BaseUrl: {{ .Values.config.jellyfinBaseUrl }}
  Lidarr__BaseUrl: {{ .Values.config.lidarrBaseUrl }}
  MusicDiscovery__Provider: {{ .Values.config.musicDiscoveryProvider }}
