replicaCount: 1

image:
  repository: musicarr
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 5000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: musicarr.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

config:
  aspnetcoreEnvironment: Production
  jellyfinBaseUrl: "http://jellyfin:8096"
  lidarrBaseUrl: "http://lidarr:8686"
  musicDiscoveryProvider: "MusicBrainz"

secrets:
  connectionString: "Host=postgres;Database=musicarr;Username=musicarr;******"
  jellyfinApiKey: ""
  lidarrApiKey: ""

postgresql:
  enabled: true
  auth:
    database: musicarr
    username: musicarr
    password: changeme

probes:
  liveness:
    path: /health/live
    initialDelaySeconds: 10
    periodSeconds: 30
  readiness:
    path: /health/ready
    initialDelaySeconds: 5
    periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
