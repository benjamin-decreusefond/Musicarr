name: Build and push image

# Push the Docker image to Docker Hub (paganim/musicarr:latest) on every push
# to the default branch. Requires two repo secrets:
#   DOCKERHUB_USERNAME  - Docker Hub account (e.g. paganim)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with write scope
#
# Pull requests run the same build as a validation step but do NOT log in or
# push to Docker Hub (so PR branches can't publish images or need the secrets).
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build${{ github.event_name != 'pull_request' && ' and push' || ' (validate only)' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            paganim/musicarr:latest
            paganim/musicarr:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
