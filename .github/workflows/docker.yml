name: Build and push image

# Push the Docker image to Docker Hub (paganim/musicarr:latest) on every push
# to the default branch. Requires two repo secrets:
#   DOCKERHUB_USERNAME  - Docker Hub account (e.g. paganim)
#   DOCKERHUB_TOKEN     - a Docker Hub access token with write scope
on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            paganim/musicarr:latest
            paganim/musicarr:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
