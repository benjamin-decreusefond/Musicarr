services:
  musicarr:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=musicarr;Username=musicarr;******
      - Jellyfin__BaseUrl=http://jellyfin:8096
      - Jellyfin__ApiKey=${JELLYFIN_API_KEY:-}
      - Lidarr__BaseUrl=http://lidarr:8686
      - Lidarr__ApiKey=${LIDARR_API_KEY:-}
      - Cors__Origins=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - musicarr

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=musicarr
      - POSTGRES_USER=musicarr
      - POSTGRES_PASSWORD=musicarr
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicarr"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - musicarr

  jellyfin:
    image: jellyfin/jellyfin:latest
    ports:
      - "8096:8096"
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - music_data:/media/music
    networks:
      - musicarr

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
    ports:
      - "8686:8686"
    volumes:
      - lidarr_config:/config
      - music_data:/music
    networks:
      - musicarr

volumes:
  postgres_data:
  jellyfin_config:
  jellyfin_cache:
  music_data:
  lidarr_config:

networks:
  musicarr:
    driver: bridge
